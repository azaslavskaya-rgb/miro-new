<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
</head>
<body>
  <h3>Drive Link Extractor</h3>
  <button id="run">Extract Links</button>
  <pre id="output" style="white-space:pre-wrap;"></pre>
  <script>
    // Контекст 1: регистрация иконки в сайдбаре
    miro.board.ui.on('icon:click', async () => {
      await miro.board.ui.openPanel({ url: 'index.html' });
    });

    // Контекст 2: логика внутри открытой панели
    const runBtn = document.getElementById('run');
    if (runBtn) {
      runBtn.addEventListener('click', async () => {
        const output = document.getElementById('output');
        output.textContent = 'Working...';
        try {
          const items = await miro.board.get();
          const results = items
            .filter(item => item.linkedTo)
            .map(item => ({
              id: item.id,
              type: item.type,
              title: item.title || '',
              linkedTo: item.linkedTo,
              parentId: item.parentId || null
            }));
          output.textContent = results.length
            ? JSON.stringify(results, null, 2)
            : 'No items with linkedTo found.';
        } catch (e) {
          output.textContent = 'Error: ' + e.message;
        }
      });
    }
  </script>
</body>
</html>
